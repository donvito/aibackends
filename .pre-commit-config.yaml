repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy
        entry: python3 -m mypy src tests
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: python3 -m pytest tests
        language: system
        pass_filenames: false
        always_run: true
